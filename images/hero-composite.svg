<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f1724" stop-opacity="0.0"/>
      <stop offset="60%" stop-color="#0f1724" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff004f" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
    <clipPath id="rounded">
      <rect x="0" y="0" width="520" height="700" rx="28" ry="28" />
    </clipPath>
  </defs>

  <!-- photo embedded (uses your existing jpg) -->
  <g transform="translate(40,40)">
    <g clip-path="url(#rounded)">
      <image href="images/photo_2025-07-20_21-06-04.jpg" x="0" y="0" width="520" height="700" preserveAspectRatio="xMidYMid slice"/>
      <rect x="0" y="0" width="520" height="700" fill="url(#g1)" />
    </g>

    <!-- decorative accent -->
    <g transform="translate(420,560) rotate(-18)">
      <rect x="0" y="0" width="300" height="80" rx="16" fill="#ff004f" opacity="0.12"/>
    </g>

    <!-- name badge -->
    <g transform="translate(20,20)">
      <rect x="0" y="0" width="220" height="62" rx="12" fill="#0f1724" opacity="0.55" />
      <text x="18" y="38" font-family="Poppins, sans-serif" font-size="22" fill="#ffffff" font-weight="600">Afranie Isaac</text>
    </g>

    <!-- role subtitle -->
    <text x="20" y="100" font-family="Poppins, sans-serif" font-size="18" fill="#ffd6e0">Frontend Developer • KNUST</text>

    <!-- soft shadow -->
    <rect x="-20" y="-20" width="560" height="740" rx="34" fill="transparent" filter="url(#soft)" />
  </g>
</svg>
